name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - name: Linux
            platform: ubuntu-22.04
            args: ""
          - name: Windows
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.30.3 --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release bundles
        id: tauri-build
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: dr-tools-${{ runner.os }}-${{ matrix.name }}
          path: ${{ steps.tauri-build.outputs.artifactPaths }}
          if-no-files-found: error

      - name: Build and publish release bundles
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Dr.Tools ${{ github.ref_name }}
          releaseBody: |
            ## Downloads

            - Download the installer or bundle for your platform from the assets attached to this release.
            - Choose the package that matches your operating system and CPU architecture.

            ## Highlights

            - See the commit history or project documentation for the main updates included in this version.
            - You can further customize this section later with hand-written release notes if needed.

            ## Notes

            - Tags containing `-` are published as prereleases.
            - If you are testing, prefer prerelease tags such as `v0.1.0-beta.1`.
            - If you are shipping to users, use stable tags such as `v0.1.0`.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
