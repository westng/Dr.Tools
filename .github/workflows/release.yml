name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    if: github.event_name == 'workflow_dispatch'
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Bump patch version
        id: bump
        run: |
          next_version="$(node scripts/bump-version.mjs --set-next-patch)"
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next_version}" >> "$GITHUB_OUTPUT"

      - name: Commit and push release version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json scripts/bump-version.mjs
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
          git push origin "${{ steps.bump.outputs.tag }}"

  build-tauri-dispatch:
    if: github.event_name == 'workflow_dispatch'
    needs: prepare-release
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - name: Linux
            platform: ubuntu-22.04
            args: ""
          - name: Windows
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install pnpm
        run: npm install --global pnpm@10.30.3

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: Dr.Tools ${{ needs.prepare-release.outputs.tag }}
          releaseBody: |
            ## Downloads

            - Download the installer or bundle for your platform from the assets attached to this release.
            - Choose the package that matches your operating system and CPU architecture.

            ## Highlights

            - See the commit history or project documentation for the main updates included in this version.
            - You can further customize this section later with hand-written release notes if needed.

            ## Notes

            - Tags containing `-` are published as prereleases.
            - If you are testing, prefer prerelease tags such as `v0.1.0-beta.1`.
            - If you are shipping to users, use stable tags such as `v0.1.0`.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true

  build-tauri-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - name: Linux
            platform: ubuntu-22.04
            args: ""
          - name: Windows
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install pnpm
        run: npm install --global pnpm@10.30.3

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Dr.Tools ${{ github.ref_name }}
          releaseBody: |
            ## Downloads

            - Download the installer or bundle for your platform from the assets attached to this release.
            - Choose the package that matches your operating system and CPU architecture.

            ## Highlights

            - See the commit history or project documentation for the main updates included in this version.
            - You can further customize this section later with hand-written release notes if needed.

            ## Notes

            - Tags containing `-` are published as prereleases.
            - If you are testing, prefer prerelease tags such as `v0.1.0-beta.1`.
            - If you are shipping to users, use stable tags such as `v0.1.0`.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
